---
layout: default
---
<main>
  <article class="page-hero">
    <div class="container narrow">
      <div class="eyebrow">Новость · {{ page.date | date: "%d.%m.%Y" }}</div>
      <h1>{{ page.title }}</h1>
      {% if page.description %}<p class="lead">{{ page.description }}</p>{% endif %}
    </div>
  </article>

  <section class="content-section">
    <div class="container narrow content-card prose">
      {{ content }}
    </div>
  </section>
</main>
