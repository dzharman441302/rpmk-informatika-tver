---
layout: default
---
<main>
  <article class="page-hero">
    <div class="container narrow">
      <div class="eyebrow">Материал{% if page.direction %} · {{ page.direction }}{% endif %}</div>
      <h1>{{ page.title }}</h1>
      {% if page.description %}<p class="lead">{{ page.description }}</p>{% endif %}
      {% if page.file %}
        <div class="hero-actions compact">
          <a class="btn btn-primary" href="{{ page.file | relative_url }}">Скачать файл</a>
        </div>
      {% endif %}
    </div>
  </article>

  <section class="content-section">
    <div class="container narrow content-card prose">
      {{ content }}
    </div>
  </section>
</main>
