# Админка сайта РПМК по информатике Тверской области

backend:
  name: github
  repo: dzharman441302/rpmk-informatika-tver
  branch: main

# Для обычного запуска на GitHub Pages не мешает.
# Используется только при локальной разработке.
local_backend: true

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "https://xn----stbfkbfs.xn--p1ai"
display_url: "https://xn----stbfkbfs.xn--p1ai"
locale: "ru"

collections:
  - name: "news"
    label: "Новости"
    label_singular: "Новость"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{year}}-{{month}}-{{day}}"
    fields:
      - label: "Заголовок"
        name: "title"
        widget: "string"

      - label: "Краткое описание"
        name: "description"
        widget: "text"
        required: false

      - label: "Дата публикации"
        name: "date"
        widget: "datetime"
        type: "date"
        format: "YYYY-MM-DD"
        date_format: "DD.MM.YYYY"
        required: false

      - label: "Текст новости"
        name: "body"
        widget: "markdown"

  - name: "materials"
    label: "Материалы"
    label_singular: "Материал"
    folder: "_materials"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} · {{direction}} · {{category}}"
    fields:
      - label: "Заголовок"
        name: "title"
        widget: "string"

      - label: "Краткое описание"
        name: "description"
        widget: "text"
        required: false

      - label: "Дата"
        name: "date"
        widget: "datetime"
        type: "date"
        format: "YYYY-MM-DD"
        date_format: "DD.MM.YYYY"
        required: false

      - label: "Направление"
        name: "direction"
        widget: "select"
        options:
          - "ВСОШ"
          - "ГИА"
          - "Методическая работа"
          - "Новости РПМК"
        required: false

      - label: "Категория"
        name: "category"
        widget: "select"
        options:
          - "Школьный этап"
          - "Муниципальный этап"
          - "Региональный этап"
          - "ОГЭ"
          - "ЕГЭ"
          - "Рекомендации"
          - "Общие материалы"
        required: false

      - label: "Прикреплённый файл"
        name: "file"
        widget: "file"
        required: false

      - label: "Текст / пояснение"
        name: "body"
        widget: "markdown"
        required: false

  - name: "pages"
    label: "Страницы сайта"
    files:
      - label: "Главная"
        name: "home"
        file: "index.md"
        fields:
          - label: "Макет"
            name: "layout"
            widget: "hidden"
            default: "home"

          - label: "Заголовок страницы"
            name: "title"
            widget: "string"

          - label: "Заголовок первого экрана"
            name: "hero_title"
            widget: "string"

          - label: "Текст первого экрана"
            name: "hero_text"
            widget: "text"

          - label: "Описание для поисковиков"
            name: "description"
            widget: "text"
            required: false

      - label: "ВСОШ"
        name: "vsoh"
        file: "vsoh/index.md"
        fields:
          - label: "Заголовок"
            name: "title"
            widget: "string"

          - label: "Метка"
            name: "eyebrow"
            widget: "string"
            required: false

          - label: "Описание"
            name: "description"
            widget: "text"
            required: false

          - label: "Текст страницы"
            name: "body"
            widget: "markdown"

      - label: "ГИА"
        name: "gia"
        file: "gia/index.md"
        fields:
          - label: "Заголовок"
            name: "title"
            widget: "string"

          - label: "Метка"
            name: "eyebrow"
            widget: "string"
            required: false

          - label: "Описание"
            name: "description"
            widget: "text"
            required: false

          - label: "Текст страницы"
            name: "body"
            widget: "markdown"

      - label: "Контакты"
        name: "contacts"
        file: "contacts/index.md"
        fields:
          - label: "Заголовок"
            name: "title"
            widget: "string"

          - label: "Метка"
            name: "eyebrow"
            widget: "string"
            required: false

          - label: "Описание"
            name: "description"
            widget: "text"
            required: false

          - label: "Текст страницы"
            name: "body"
            widget: "markdown"
